<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Explorer</title>
    <link rel="stylesheet" href="src/css/style.css">
    <script type="module" src="src/js/main.js" defer></script>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Favorite Trails</a></li>
                <li><a href="#">Completed Trails</a></li>
                <li><a href="#">Explore Trails</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1>Trail Explorer</h1>
            <div class="placeholder-image-wrapper">
                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="#A26652" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
            </div>
            <p>Plan your next hike!</p>
            <button class="btn-plan" id="openModalBtn">Plan</button>
        </section>

        <section class="explore-container">
            <div class="search-wrapper">
                <input type="text" class="search-input" placeholder="Find a trail">
            </div>

            <div class="trail-detail-card">
                <div class="large-trail-image">
                    <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="#A26652" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy=\"8.5\" r=\"1.5\"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                </div>
                <div class="trail-info-content">
                    <h2>Loading next adventure...</h2> 
                    <p></p>
                    <button class="btn-plan" id="openModalBtn">Plan This Hike</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
        </div>
        <div>Trail Explorer 2026 &copy;</div>
    </footer>

    <!-- Plan Your Hike Modal Component -->
    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <h3>Plan Your Hike</h3>
            <form id="hikePlanForm" method="POST">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="text" id="hike" placeholder="Hike" required>
                </div>
                <div class="form-group">
                    <input type="text" id="date" placeholder="Date" required>
                </div>
                <button type="submit" class="btn-submit">Send</button>
            </form>
        </div>
    </div>
</body>
</html>
